<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>横浜フィッシングピアーズ 釣果ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif;
  background:#EEF2F7;color:#1a1a2e;min-height:100vh;
}
header{
  background:linear-gradient(135deg,#1565C0,#0D47A1);
  color:white;padding:1.1rem 2rem 1rem;box-shadow:0 2px 8px rgba(0,0,0,.25);
}
header h1{font-size:1.1rem;font-weight:700;margin-bottom:.7rem;opacity:.9}
.tabs{display:flex;gap:.5rem;margin-bottom:.75rem}
.tab{
  padding:.42rem 1.5rem;border:none;border-radius:999px;
  font-size:.92rem;font-weight:700;cursor:pointer;
  background:rgba(255,255,255,.18);color:rgba(255,255,255,.8);
  transition:all .15s;letter-spacing:.03em;
}
.tab.active{background:white;color:#1565C0;}
.tab:hover:not(.active){background:rgba(255,255,255,.3);color:white}
.controls{display:flex;align-items:center;gap:.9rem;flex-wrap:wrap}
.controls label{font-size:.85rem;display:flex;align-items:center;gap:.35rem}
.controls input[type=date]{
  padding:.3rem .55rem;border:none;border-radius:6px;
  font-size:.85rem;background:rgba(255,255,255,.93);color:#1a1a2e;cursor:pointer;
}
.badge{
  margin-left:auto;background:rgba(255,255,255,.2);
  padding:.28rem .65rem;border-radius:999px;font-size:.78rem;
}
main{padding:1.25rem 2rem;max-width:1400px;margin:0 auto;display:grid;gap:1.2rem}
.card{
  background:white;border-radius:12px;padding:1.1rem 1.35rem;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
}
.card h2{
  font-size:.9rem;font-weight:600;color:#1565C0;
  margin-bottom:.8rem;padding-bottom:.45rem;border-bottom:2px solid #E8EEF8;
}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:.8rem}
@media(max-width:650px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:#F0F4FF;border-radius:8px;padding:.65rem .9rem;text-align:center}
.stat .lbl{font-size:.7rem;color:#666;margin-bottom:.15rem}
.stat .val{font-size:1.35rem;font-weight:700;color:#1565C0;line-height:1.1}
.stat .unit{font-size:.68rem;color:#888;margin-top:.1rem}
.two-col{display:grid;grid-template-columns:2fr 3fr;gap:1.2rem}
@media(max-width:960px){.two-col{grid-template-columns:1fr}}
.chips{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.7rem;max-height:90px;overflow-y:auto}
.chip{
  display:inline-flex;align-items:center;gap:.22rem;
  padding:.18rem .5rem;border-radius:999px;border:2px solid;
  font-size:.72rem;cursor:pointer;transition:all .13s;user-select:none;white-space:nowrap;
}
.cbox{position:relative}
@media(max-width:480px){
  header{padding:.9rem 1rem .8rem}
  header h1{font-size:.95rem}
  .tab{padding:.36rem 1rem;font-size:.82rem}
  .controls{gap:.5rem}
  .controls input[type=date]{font-size:.8rem;padding:.35rem .45rem}
  main{padding:.75rem .75rem;gap:.9rem}
  .card{padding:.85rem 1rem}
  .stat .val{font-size:1.1rem}
  .chip{padding:.35rem .65rem;font-size:.78rem}
  .chips{max-height:120px}
}
</style>
</head>
<body>

<header>
  <h1>横浜フィッシングピアーズ 釣果ダッシュボード（2025/01〜2026/07）</h1>
  <div class="tabs">
    <button class="tab active" data-fac="honmoku">本牧</button>
    <button class="tab"        data-fac="daikoku">大黒</button>
  </div>
  <div class="controls">
    <label>開始日<input type="date" id="sd"></label>
    <span>〜</span>
    <label>終了日<input type="date" id="ed"></label>
    <span class="badge" id="pb"></span>
  </div>
</header>

<main>
  <div class="card"><div class="stats" id="stats"></div></div>

  <div class="card">
    <h2>来場者数の日別推移</h2>
    <div class="cbox" style="height:210px"><canvas id="vc"></canvas></div>
  </div>

  <div class="two-col">
    <div class="card">
      <h2>魚種別釣果ランキング（上位15種）</h2>
      <div class="cbox" style="height:440px"><canvas id="rc"></canvas></div>
    </div>
    <div class="card">
      <h2>主要魚種の日別釣果推移</h2>
      <div class="chips" id="chips"></div>
      <div class="cbox" style="height:340px"><canvas id="tc"></canvas></div>
    </div>
  </div>
</main>

let DATES, ALL_SP, sel;

const sdEl = document.getElementById('sd');
const edEl = document.getElementById('ed');

function spColor(n) { return PALETTE[ALL_SP.indexOf(n) % PALETTE.length]; }

function filtered() {
  const s = sdEl.value ? sdEl.value.split('-').join('/') : DATES[0];
  const e = edEl.value ? edEl.value.split('-').join('/') : DATES[DATES.length - 1];
  return DATES.filter(d => d >= s && d <= e);
}

function buildChips() {
  const wrap = document.getElementById('chips');
  wrap.innerHTML = '';
  ALL_SP.forEach(function(n) {
    const c = spColor(n);
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.innerHTML = '<span style="width:7px;height:7px;border-radius:50%;display:inline-block;background:' + c + '"></span>' + n;
    function applyStyle(active) {
      btn.style.borderColor = c;
      btn.style.backgroundColor = active ? c : 'white';
      btn.style.color = active ? 'white' : c;
    }
    applyStyle(sel.has(n));
    btn.addEventListener('click', function() {
      if (sel.has(n)) { sel.delete(n); applyStyle(false); }
      else            { sel.add(n);    applyStyle(true);  }
      updateTrends(filtered());
    });
    wrap.appendChild(btn);
  });
}

  const tv = ds.reduce(function(s, dt) { return s + (d[dt].visitors || 0); }, 0);
  const tf = ds.reduce(function(s, dt) { return s + Object.values(d[dt].fish || {}).reduce(function(a, b) { return a + b; }, 0); }, 0);
  const sp = new Set(ds.reduce(function(arr, dt) { return arr.concat(Object.keys(d[dt].fish || {})); }, [])).size;
  const av = ds.length ? Math.round(tv / ds.length) : 0;
  document.getElementById('stats').innerHTML =
    stat('期間', ds.length, '日') +
    stat('総来場者数', tv.toLocaleString(), '人') +
    stat('1日平均', av.toLocaleString(), '人') +
    stat('総釣果', tf.toLocaleString(), '匹') +
    stat('魚種数', sp, '種');
}

function updateVisitors(ds) {
  const d = fdata();
  vchart.data.labels = ds;
  vchart.data.datasets[0].data = ds.map(function(dt) { return d[dt].visitors || 0; });
  vchart.data.datasets[0].pointRadius = ds.length > 60 ? 0 : 3;
  vchart.update();
}

function updateRanking(ds) {
  const d = fdata();
  const t = {};
  ds.forEach(function(dt) {
    Object.entries(d[dt].fish || {}).forEach(function(e) { t[e[0]] = (t[e[0]] || 0) + e[1]; });
  });
  const s = Object.entries(t).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 15);
  rchart.data.labels = s.map(function(e) { return e[0]; });
  rchart.data.datasets[0].data = s.map(function(e) { return e[1]; });
  rchart.data.datasets[0].backgroundColor = s.map(function(e) { return spColor(e[0]); });
  rchart.update();
}

function updateTrends(ds) {
  const d = fdata();
  const pr = ds.length > 120 ? 0 : ds.length > 60 ? 1 : 3;
  tchart.data.labels = ds;
  tchart.data.datasets = Array.from(sel).map(function(n) {
    return {
      label: n,
      data: ds.map(function(dt) { return (d[dt].fish || {})[n] || 0; }),
      borderColor: spColor(n),
      backgroundColor: spColor(n) + '22',
      tension: 0.3, fill: false, pointRadius: pr, borderWidth: 1.5,
    };
  });
  tchart.update();
}

function updateAll() {
  const ds = filtered();
  document.getElementById('pb').textContent = ds.length + '日間';
  updateStats(ds);
  updateVisitors(ds);
  updateRanking(ds);
  updateTrends(ds);
}

// --- 施設切り替え ---
function initFacility(key) {
  facKey = key;
  const d = fdata();
  DATES = Object.keys(d).sort();

  const t = {};
  DATES.forEach(function(dt) {
    Object.entries(d[dt].fish || {}).forEach(function(e) { t[e[0]] = (t[e[0]] || 0) + e[1]; });
  });
  ALL_SP = Object.entries(t).sort(function(a, b) { return b[1] - a[1]; }).map(function(e) { return e[0]; });
  sel = new Set(ALL_SP.slice(0, 5));

  // タブのアクティブ状態を更新
  document.querySelectorAll('.tab').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.fac === key);
  });

  // 日付ピッカーをリセット
  const first = DATES[0].split('/').join('-');
  const last  = DATES[DATES.length - 1].split('/').join('-');
  sdEl.value = first; edEl.value = last;
  sdEl.min = first;  sdEl.max = last;
  edEl.min = first;  edEl.max = last;

  buildChips();
  updateAll();
}

// --- イベント登録 ---
document.querySelectorAll('.tab').forEach(function(btn) {
  btn.addEventListener('click', function() { initFacility(btn.dataset.fac); });
});

['input', 'change'].forEach(function(ev) {
  sdEl.addEventListener(ev, updateAll);
  edEl.addEventListener(ev, updateAll);
});

// --- 初期表示 ---
initFacility('honmoku');
</script>
