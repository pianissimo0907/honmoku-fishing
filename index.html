<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>本牧フィッシングピアーズ 釣果ダッシュボード 2025/01〜2026/05</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','Yu Gothic UI','Meiryo',sans-serif;
  background:#EEF2F7;color:#1a1a2e;min-height:100vh;
}
header{
  background:linear-gradient(135deg,#1565C0,#0D47A1);
  color:white;padding:1.25rem 2rem;box-shadow:0 2px 8px rgba(0,0,0,.25);
}
header h1{font-size:1.2rem;font-weight:700;margin-bottom:.85rem}
.controls{display:flex;align-items:center;gap:.9rem;flex-wrap:wrap}
.controls label{font-size:.85rem;display:flex;align-items:center;gap:.35rem}
.controls input[type=date]{
  padding:.3rem .55rem;border:none;border-radius:6px;
  font-size:.85rem;background:rgba(255,255,255,.93);color:#1a1a2e;cursor:pointer;
}
.badge{
  margin-left:auto;background:rgba(255,255,255,.2);
  padding:.28rem .65rem;border-radius:999px;font-size:.78rem;
}
main{padding:1.25rem 2rem;max-width:1400px;margin:0 auto;display:grid;gap:1.2rem}
.card{
  background:white;border-radius:12px;padding:1.1rem 1.35rem;
  box-shadow:0 2px 8px rgba(0,0,0,.07);
}
.card h2{
  font-size:.9rem;font-weight:600;color:#1565C0;
  margin-bottom:.8rem;padding-bottom:.45rem;border-bottom:2px solid #E8EEF8;
}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:.8rem}
@media(max-width:650px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:#F0F4FF;border-radius:8px;padding:.65rem .9rem;text-align:center}
.stat .lbl{font-size:.7rem;color:#666;margin-bottom:.15rem}
.stat .val{font-size:1.35rem;font-weight:700;color:#1565C0;line-height:1.1}
.stat .unit{font-size:.68rem;color:#888;margin-top:.1rem}
.two-col{display:grid;grid-template-columns:2fr 3fr;gap:1.2rem}
@media(max-width:960px){.two-col{grid-template-columns:1fr}}
.chips{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.7rem;max-height:90px;overflow-y:auto}
.chip{
  display:inline-flex;align-items:center;gap:.22rem;
  padding:.18rem .5rem;border-radius:999px;border:2px solid;
  font-size:.72rem;cursor:pointer;transition:all .13s;user-select:none;white-space:nowrap;
}
.cbox{position:relative}
@media(max-width:480px){
  header{padding:.9rem 1rem}
  header h1{font-size:1rem;margin-bottom:.65rem}
  .controls{gap:.5rem}
  .controls input[type=date]{font-size:.8rem;padding:.35rem .45rem}
  main{padding:.75rem .75rem;gap:.9rem}
  .card{padding:.85rem 1rem}
  .stat .val{font-size:1.1rem}
  .chip{padding:.35rem .65rem;font-size:.78rem}
  .chips{max-height:120px}
}
</style>
</head>
<body>

<header>
  <h1>本牧フィッシングピアーズ 釣果ダッシュボード 2025/01〜2026/05</h1>
  <div class="controls">
    <label>開始日<input type="date" id="sd"></label>
    <span>〜</span>
    <label>終了日<input type="date" id="ed"></label>
    <span class="badge" id="pb"></span>
  </div>
</header>

<main>
  <div class="card"><div class="stats" id="stats"></div></div>

  <div class="card">
    <h2>来場者数の日別推移</h2>
    <div class="cbox" style="height:210px"><canvas id="vc"></canvas></div>
  </div>

  <div class="two-col">
    <div class="card">
      <h2>魚種別釣果ランキング（上位15種）</h2>
      <div class="cbox" style="height:440px"><canvas id="rc"></canvas></div>
    </div>
    <div class="card">
      <h2>主要魚種の日別釣果推移</h2>
      <div class="chips" id="chips"></div>
      <div class="cbox" style="height:340px"><canvas id="tc"></canvas></div>
    </div>
  </div>
</main>

      legend: { display: false },
      tooltip: { callbacks: { label: ctx => ctx.raw.toLocaleString() + ' 人' } },
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { font: { size: 10 }, maxTicksLimit: 14, maxRotation: 0, autoSkip: true },
      },
      y: {
        ticks: { font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.05)' },
        title: { display: true, text: '人', font: { size: 11 } },
      },
    },
  }
});

// --- Chart 2: Ranking (horizontal bar) ---
const rchart = new Chart(document.getElementById('rc'), {
  type: 'bar',
  data: {
    labels: [],
    datasets: [{ label: '釣れた数（匹）', data: [], backgroundColor: [], borderRadius: 4 }]
  },
  options: {
    indexAxis: 'y',
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: ctx => ctx.raw.toLocaleString() + ' 匹' } },
    },
    scales: {
      x: { ticks: { font: { size: 11 } }, grid: { color: 'rgba(0,0,0,.05)' } },
      y: { ticks: { font: { size: 11 } }, grid: { display: false } },
    },
  }
});

// --- Chart 3: Trends (line) ---
const tchart = new Chart(document.getElementById('tc'), {
  type: 'line',
  data: { labels: [], datasets: [] },
  options: {
    responsive: true, maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: { mode: 'index', intersect: false },
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { font: { size: 10 }, maxTicksLimit: 16, maxRotation: 45, autoSkip: true },
      },
      y: {
        ticks: { font: { size: 10 } }, grid: { color: 'rgba(0,0,0,.05)' },
        title: { display: true, text: '匹', font: { size: 10 } },
      },
    },
  }
});

// --- Update functions ---
function stat(lbl, val, unit) {
  return '<div class="stat"><div class="lbl">' + lbl + '</div><div class="val">' + val + '</div><div class="unit">' + unit + '</div></div>';
}

function updateStats(ds) {
  const tv = ds.reduce((s, d) => s + (DATA[d].visitors || 0), 0);
  const tf = ds.reduce((s, d) => s + Object.values(DATA[d].fish || {}).reduce((a, b) => a + b, 0), 0);
  const sp = new Set(ds.flatMap(d => Object.keys(DATA[d].fish || {}))).size;
  const av = ds.length ? Math.round(tv / ds.length) : 0;
  document.getElementById('stats').innerHTML =
    stat('期間', ds.length, '日') +
    stat('総来場者数', tv.toLocaleString(), '人') +
    stat('1日平均', av.toLocaleString(), '人') +
    stat('総釣果', tf.toLocaleString(), '匹') +
    stat('魚種数', sp, '種');
}

function updateVisitors(ds) {
  vchart.data.labels = ds;
  vchart.data.datasets[0].data = ds.map(d => DATA[d].visitors || 0);
  vchart.data.datasets[0].pointRadius = ds.length > 60 ? 0 : 3;
  vchart.update();
}

function updateRanking(ds) {
  const t = {};
  ds.forEach(d => Object.entries(DATA[d].fish || {}).forEach(([n, c]) => t[n] = (t[n] || 0) + c));
  const s = Object.entries(t).sort((a, b) => b[1] - a[1]).slice(0, 15);
  rchart.data.labels = s.map(([n]) => n);
  rchart.data.datasets[0].data = s.map(([, c]) => c);
  rchart.data.datasets[0].backgroundColor = s.map(([n]) => spColor(n));
  rchart.update();
}

function updateTrends(ds) {
  const pr = ds.length > 120 ? 0 : ds.length > 60 ? 1 : 3;
  tchart.data.labels = ds;
  tchart.data.datasets = [...sel].map(n => ({
    label: n,
    data: ds.map(d => (DATA[d].fish || {})[n] || 0),
    borderColor: spColor(n),
    backgroundColor: spColor(n) + '22',
    tension: 0.3, fill: false, pointRadius: pr, borderWidth: 1.5,
  }));
  tchart.update();
}

function updateAll() {
  const ds = filtered();
  document.getElementById('pb').textContent = ds.length + '日間';
  updateStats(ds);
  updateVisitors(ds);
  updateRanking(ds);
  updateTrends(ds);
}

['input', 'change'].forEach(function(ev) {
  sdEl.addEventListener(ev, updateAll);
  edEl.addEventListener(ev, updateAll);
});
updateAll();
</script>
